<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task received — Etion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Sentient';
      src: url('brand_assets/Sentient-Regular.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark:  #1d1d1b;
      --lime:  #c8d432;
      --cream: #f4f3ee;
      --muted: #8a8a7e;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 48px 24px;
      overflow: hidden;
      position: relative;
    }

    /* Subtle background grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* Glow orb */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200, 212, 50, 0.07) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
    }

    /* Wordmark */
    .wordmark {
      font-family: 'Sentient', serif;
      font-size: 22px;
      color: rgba(244, 243, 238, 0.5);
      text-decoration: none;
      letter-spacing: -0.01em;
      margin-bottom: 72px;
      transition: color 0.2s;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.1s forwards;
    }
    .wordmark:hover { color: var(--cream); }

    /* Check mark */
    .check {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--lime);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 40px;
      opacity: 0;
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.35s forwards;
    }
    .check svg {
      width: 28px;
      height: 28px;
    }
    .check svg path {
      stroke: var(--dark);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      stroke-dasharray: 40;
      stroke-dashoffset: 40;
      animation: drawCheck 0.4s ease 0.85s forwards;
    }

    /* Heading */
    h1 {
      font-family: 'Sentient', serif;
      font-size: clamp(48px, 8vw, 88px);
      font-weight: 400;
      line-height: 1.0;
      letter-spacing: -0.03em;
      color: var(--cream);
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.5s forwards;
    }
    h1 em {
      font-style: italic;
      color: var(--lime);
    }

    /* Sub */
    .sub {
      font-size: 17px;
      font-weight: 400;
      color: rgba(244, 243, 238, 0.55);
      line-height: 1.6;
      max-width: 380px;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.65s forwards;
    }

    /* Button */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      background: var(--lime);
      color: var(--dark);
      border: none;
      transition: background 0.2s, transform 0.2s;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.8s forwards;
    }
    .btn:hover {
      background: #d9e840;
      transform: translateY(-2px);
    }
    .btn svg {
      width: 16px;
      height: 16px;
      transition: transform 0.2s;
    }
    .btn:hover svg { transform: translateX(-3px); }

    /* Divider line */
    .divider {
      width: 1px;
      height: 48px;
      background: rgba(244, 243, 238, 0.1);
      margin: 56px auto 0;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.9s forwards;
    }

    .footnote {
      margin-top: 20px;
      font-size: 13px;
      color: rgba(244, 243, 238, 0.25);
      letter-spacing: 0.01em;
      opacity: 0;
      animation: fadeUp 0.7s ease 1.0s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }
  </style>
</head>
<body>
  <div class="page">
    <a href="/" class="wordmark">etion</a>

    <div class="check">
      <svg viewBox="0 0 24 24">
        <path d="M5 12.5l5 5 9-9"/>
      </svg>
    </div>

    <h1>Your task<br>is <em>in.</em></h1>

    <p class="sub">We've received your request and will match you with a neighbour nearby. Expect a message soon.</p>

    <a href="/" class="btn">
      <svg viewBox="0 0 16 16" fill="none">
        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back to home
    </a>

    <div class="divider"></div>
    <p class="footnote">No fees. No middlemen. Just neighbours.</p>
  </div>
</body>
</html>
